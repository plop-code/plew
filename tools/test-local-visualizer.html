<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Visualizer — Automated Tests</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
        .pass { color: #6bcb77; }
        .fail { color: #ff6b6b; }
        .section { margin: 16px 0 4px; font-weight: bold; color: #4ecdc4; }
        #results { white-space: pre-wrap; }
        #summary { margin-top: 20px; font-size: 1.2em; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>
<h2>Local Visualizer — Test Suite</h2>
<p>This page loads the standalone visualizer in a hidden iframe and runs automated tests against its internal functions.</p>
<div id="results"></div>
<div id="summary"></div>

<iframe id="vizFrame" src="local-visualizer.html" style="display:none; width:1200px; height:800px;"></iframe>

<script>
const results = document.getElementById('results');
const summaryEl = document.getElementById('summary');
let passed = 0, failed = 0;

function log(msg, ok) {
    const span = document.createElement('span');
    span.className = ok ? 'pass' : 'fail';
    span.textContent = (ok ? 'PASS' : 'FAIL') + '  ' + msg + '\n';
    results.appendChild(span);
    if (ok) passed++; else failed++;
}

function section(name) {
    const div = document.createElement('div');
    div.className = 'section';
    div.textContent = '=== ' + name + ' ===';
    results.appendChild(div);
}

function showSummary() {
    const total = passed + failed;
    summaryEl.textContent = `${passed}/${total} tests passed` + (failed > 0 ? ` (${failed} failed)` : ' — all green!');
    summaryEl.style.background = failed > 0 ? '#2a1a1a' : '#1a2a1a';
    summaryEl.style.borderLeft = `4px solid ${failed > 0 ? '#ff6b6b' : '#6bcb77'}`;
}

document.getElementById('vizFrame').addEventListener('load', () => {
    const win = document.getElementById('vizFrame').contentWindow;
    const doc = document.getElementById('vizFrame').contentDocument;

    // =========================================================
    section('1. Page Structure');
    // =========================================================
    log('Title contains "Local Standalone"',
        doc.title.includes('Local Standalone'));

    log('File input exists with multiple attribute',
        !!doc.getElementById('fileInput') && doc.getElementById('fileInput').hasAttribute('multiple'));

    log('File input does NOT have accept=".csv" (accepts all files)',
        !doc.getElementById('fileInput').hasAttribute('accept') ||
        doc.getElementById('fileInput').getAttribute('accept') !== '.csv');

    log('No mediaFolderInput element exists',
        !doc.getElementById('mediaFolderInput'));

    log('No mediaFolderBtn element exists',
        !doc.getElementById('mediaFolderBtn'));

    log('Instructions div exists',
        !!doc.getElementById('localInstructions'));

    log('Load status div exists (hidden initially)',
        !!doc.getElementById('loadStatus') &&
        doc.getElementById('loadStatus').style.display === 'none');

    // =========================================================
    section('2. CSV Parsing');
    // =========================================================
    try {
        const { headers, data } = win.parseCSV(
            'ID,Function,audio_url\n1,Genuine,test.wav\n2,Offer,test2.wav'
        );
        log('parseCSV returns correct headers', headers.length === 3 && headers[0] === 'ID');
        log('parseCSV returns correct data length', data.length === 2);
        log('parseCSV data has correct values', data[0].Function === 'Genuine' && data[1].audio_url === 'test2.wav');
    } catch (e) {
        log('parseCSV threw: ' + e.message, false);
    }

    // =========================================================
    section('3. Media Column Detection');
    // =========================================================
    try {
        const cols = win.detectMediaColumns(['ID', 'audio_url', 'image_url', 'Function']);
        log('detectMediaColumns finds audio_url', cols.some(c => c.column === 'audio_url' && c.type === 'audio'));
        log('detectMediaColumns finds image_url', cols.some(c => c.column === 'image_url' && c.type === 'image'));
        log('detectMediaColumns ignores non-media', cols.length === 2);
    } catch (e) {
        log('detectMediaColumns threw: ' + e.message, false);
    }

    try {
        const prefixed = win.detectMediaColumns(['desc::id', 'dim::Function', 'med::audio_url', 'med::image_url']);
        log('detectMediaColumns handles med:: prefix', prefixed.length === 2);
    } catch (e) {
        log('detectMediaColumns (prefixed) threw: ' + e.message, false);
    }

    // =========================================================
    section('4. Media URL Resolution (localMediaMap)');
    // =========================================================
    // Simulate local media map
    win.localMediaMap = {};
    win.csvBaseUrl = '';

    win.localMediaMap['test.wav'] = 'blob:http://localhost/abc';
    win.localMediaMap['photo.png'] = 'blob:http://localhost/def';

    log('resolveMediaUrl finds basename in localMediaMap',
        win.resolveMediaUrl('test.wav') === 'blob:http://localhost/abc');

    log('resolveMediaUrl extracts basename from path',
        win.resolveMediaUrl('/kourosh/test.wav') === 'blob:http://localhost/abc');

    log('resolveMediaUrl extracts basename from subdir path',
        win.resolveMediaUrl('subdir/test.wav') === 'blob:http://localhost/abc');

    log('resolveMediaUrl passes through absolute URLs',
        win.resolveMediaUrl('https://example.com/test.wav') === 'https://example.com/test.wav');

    log('resolveMediaUrl passes through blob URLs',
        win.resolveMediaUrl('blob:http://x/y') === 'blob:http://x/y');

    log('resolveMediaUrl passes through data URIs',
        win.resolveMediaUrl('data:audio/wav;base64,abc') === 'data:audio/wav;base64,abc');

    log('resolveMediaUrl returns original if not in map',
        win.resolveMediaUrl('missing.wav') === 'missing.wav');

    // =========================================================
    section('5. Media Type Inference');
    // =========================================================
    log('inferMediaTypeFromUrl: wav → audio', win.inferMediaTypeFromUrl('test.wav') === 'audio');
    log('inferMediaTypeFromUrl: mp3 → audio', win.inferMediaTypeFromUrl('song.mp3') === 'audio');
    log('inferMediaTypeFromUrl: png → image', win.inferMediaTypeFromUrl('pic.png') === 'image');
    log('inferMediaTypeFromUrl: jpg → image', win.inferMediaTypeFromUrl('pic.jpg') === 'image');
    log('inferMediaTypeFromUrl: mp4 → video', win.inferMediaTypeFromUrl('vid.mp4') === 'video');
    log('inferMediaTypeFromUrl: unknown ext → unknown', win.inferMediaTypeFromUrl('file.xyz') === 'unknown');

    // =========================================================
    section('6. handleLocalFiles (synthetic test)');
    // =========================================================
    // Create synthetic File objects to test handleLocalFiles
    try {
        const csvContent = 'ID,Function,audio_url\n1,Genuine,hello.wav\n2,Offer,world.wav';
        const csvBlob = new Blob([csvContent], { type: 'text/csv' });
        const csvFile = new File([csvBlob], 'test.csv', { type: 'text/csv' });

        const wavBlob = new Blob([new ArrayBuffer(44)], { type: 'audio/wav' });
        const wavFile1 = new File([wavBlob], 'hello.wav', { type: 'audio/wav' });
        const wavFile2 = new File([wavBlob], 'world.wav', { type: 'audio/wav' });

        // Create a DataTransfer to build a FileList-like object
        const dt = new DataTransfer();
        dt.items.add(csvFile);
        dt.items.add(wavFile1);
        dt.items.add(wavFile2);

        // Reset state
        win.localMediaMap = {};
        win.csvBaseUrl = '';
        win.currentData = null;

        win.handleLocalFiles(dt.files);

        // handleLocalFiles uses FileReader which is async, so check after a tick
        setTimeout(() => {
            log('localMediaMap has hello.wav after handleLocalFiles',
                !!win.localMediaMap['hello.wav']);
            log('localMediaMap has world.wav after handleLocalFiles',
                !!win.localMediaMap['world.wav']);
            log('localMediaMap values are blob URLs',
                (win.localMediaMap['hello.wav'] || '').startsWith('blob:'));

            // CSV parsing happens in FileReader callback — check after another tick
            setTimeout(() => {
                log('currentData was populated from CSV',
                    win.currentData !== null && win.currentData.length === 2);
                log('CSV data has correct values',
                    win.currentData && win.currentData[0] && win.currentData[0].Function === 'Genuine');
                log('Media columns were detected',
                    win.mediaColumns && win.mediaColumns.length === 1 && win.mediaColumns[0].column === 'audio_url');
                log('Load status is shown',
                    doc.getElementById('loadStatus').style.display !== 'none');
                log('Instructions hidden after load',
                    doc.getElementById('localInstructions').style.display === 'none');

                // =========================================================
                section('7. handleLocalFiles — no CSV');
                // =========================================================
                win.localMediaMap = {};
                const dt2 = new DataTransfer();
                dt2.items.add(wavFile1);
                win.handleLocalFiles(dt2.files);

                log('Shows error when no CSV in selection',
                    doc.getElementById('loadStatus').textContent.includes('No CSV'));

                // =========================================================
                section('8. handleLocalFiles — CSV only (no media)');
                // =========================================================
                const dt3 = new DataTransfer();
                dt3.items.add(csvFile);
                win.localMediaMap = {};
                win.handleLocalFiles(dt3.files);

                setTimeout(() => {
                    log('Shows "no media files" message when only CSV selected',
                        doc.getElementById('loadStatus').textContent.includes('no media'));

                    // =========================================================
                    section('9. Dimension Analysis');
                    // =========================================================
                    const dims = win.analyzeDimensions(
                        ['ID', 'Function', 'audio_url'],
                        [{ ID: '1', Function: 'Genuine', audio_url: 'a.wav' },
                         { ID: '2', Function: 'Offer', audio_url: 'b.wav' }]
                    );
                    log('analyzeDimensions excludes ID and audio_url',
                        dims.length === 1 && dims[0].name === 'Function');

                    // =========================================================
                    section('10. getRowMedia with localMediaMap');
                    // =========================================================
                    win.localMediaMap = { 'a.wav': 'blob:http://localhost/a123' };
                    win.mediaColumns = [{ column: 'audio_url', type: 'audio' }];
                    const media = win.getRowMedia({ audio_url: '/path/to/a.wav' });
                    log('getRowMedia resolves via localMediaMap basename',
                        media.length === 1 && media[0].url === 'blob:http://localhost/a123');
                    log('getRowMedia type is audio',
                        media[0].type === 'audio');

                    // =========================================================
                    section('11. Column Prefix Parsing');
                    // =========================================================
                    const parsed = win.parseColumnPrefix('med::audio_url');
                    log('parseColumnPrefix recognizes med:: prefix', parsed && parsed.type === 'med');
                    log('parseColumnPrefix extracts display name', parsed && parsed.displayName === 'audio_url');
                    log('parseColumnPrefix returns null for no prefix', win.parseColumnPrefix('Function') === null);

                    // =========================================================
                    section('12. Edge Cases');
                    // =========================================================
                    log('resolveMediaUrl handles empty string', win.resolveMediaUrl('') === '');
                    log('resolveMediaUrl handles null', win.resolveMediaUrl(null) === null);
                    log('resolveMediaUrl handles undefined', win.resolveMediaUrl(undefined) === undefined);
                    log('resolveMediaUrl trims whitespace',
                        (function() { win.localMediaMap = {'x.wav': 'blob:x'}; return win.resolveMediaUrl('  x.wav  ') === 'blob:x'; })());

                    // Clean up
                    win.localMediaMap = {};

                    showSummary();
                }, 100);
            }, 100);
        }, 50);
    } catch (e) {
        log('handleLocalFiles synthetic test threw: ' + e.message, false);
        showSummary();
    }
});
</script>
</body>
</html>
